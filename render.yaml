services:
  - type: web
    name: kyotei-advisor-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /data/kyotei.db
      - key: CORS_ALLOW_ORIGINS
        value: https://kyotei-advisor-web.onrender.com
    disk:
      name: kyotei-data
      mountPath: /data
      sizeGB: 1

  - type: cron
    name: kyotei-advisor-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 * * * *"
    startCommand: python scraper.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /data/kyotei.db
    disk:
      name: kyotei-data
      mountPath: /data
      sizeGB: 1
