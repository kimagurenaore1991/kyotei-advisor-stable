services:
  - type: web
    name: kyotei-advisor-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /data/kyotei.db
      - key: CORS_ALLOW_ORIGINS
        value: https://kyotei-advisor-web.onrender.com
      - key: USE_SUPABASE
        value: "True"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    disk:
      name: kyotei-data
      mountPath: /data
      sizeGB: 1
